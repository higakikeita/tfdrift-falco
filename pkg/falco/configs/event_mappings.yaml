# AWS CloudTrail Event Mappings for tfdrift-falco
# This file defines which CloudTrail events are relevant for drift detection
# and how to map them to Terraform resource types and field extraction paths.

relevant_events:
  # EC2
  - ModifyInstanceAttribute
  - ModifyNetworkInterfaceAttribute
  - ModifyVolume

  # VPC - Security Groups (Critical)
  - AuthorizeSecurityGroupIngress
  - AuthorizeSecurityGroupEgress
  - RevokeSecurityGroupIngress
  - RevokeSecurityGroupEgress
  - CreateSecurityGroup
  - DeleteSecurityGroup
  - ModifySecurityGroupRules

  # VPC - Core
  - CreateVpc
  - DeleteVpc
  - ModifyVpcAttribute
  - CreateSubnet
  - DeleteSubnet
  - ModifySubnetAttribute

  # VPC - Route Tables (Critical)
  - CreateRoute
  - DeleteRoute
  - ReplaceRoute
  - CreateRouteTable
  - DeleteRouteTable
  - AssociateRouteTable

  # VPC - Internet/NAT Gateways
  - AttachInternetGateway
  - DetachInternetGateway
  - CreateNatGateway
  - DeleteNatGateway

  # VPC - Network ACLs
  - CreateNetworkAcl
  - DeleteNetworkAcl
  - CreateNetworkAclEntry
  - DeleteNetworkAclEntry
  - ReplaceNetworkAclEntry

  # VPC - VPC Endpoints
  - CreateVpcEndpoint
  - DeleteVpcEndpoint
  - ModifyVpcEndpoint

  # ELB/ALB - Load Balancers
  - CreateLoadBalancer
  - DeleteLoadBalancer
  - ModifyLoadBalancerAttributes

  # ELB/ALB - Target Groups
  - CreateTargetGroup
  - DeleteTargetGroup
  - ModifyTargetGroup
  - ModifyTargetGroupAttributes
  - RegisterTargets
  - DeregisterTargets

  # ELB/ALB - Listeners & Rules (Critical)
  - CreateListener
  - DeleteListener
  - ModifyListener
  - CreateRule
  - DeleteRule
  - ModifyRule

  # KMS (Critical)
  - ScheduleKeyDeletion
  - DisableKey
  - EnableKey
  - PutKeyPolicy
  - CreateKey
  - CreateAlias
  - DeleteAlias
  - UpdateAlias
  - EnableKeyRotation
  - DisableKeyRotation

  # DynamoDB
  - CreateTable
  - DeleteTable
  - UpdateTable
  - UpdateTimeToLive
  - UpdateContinuousBackups

  # IAM - Policy modifications
  - PutUserPolicy
  - PutRolePolicy
  - PutGroupPolicy
  - UpdateAssumeRolePolicy
  - AttachUserPolicy
  - AttachRolePolicy
  - AttachGroupPolicy
  - CreatePolicy
  - CreatePolicyVersion

  # IAM - User/Role/Group lifecycle
  - CreateRole
  - DeleteRole
  - CreateUser
  - DeleteUser
  - CreateAccessKey
  - AddUserToGroup
  - RemoveUserFromGroup
  - UpdateAccountPasswordPolicy

  # S3
  - PutBucketPolicy
  - PutBucketVersioning
  - PutBucketEncryption
  - DeleteBucketEncryption
  - PutBucketLogging
  - PutBucketPublicAccessBlock
  - DeleteBucketPublicAccessBlock
  - PutBucketAcl

  # RDS - DB Instances
  - CreateDBInstance
  - DeleteDBInstance
  - ModifyDBInstance
  - RebootDBInstance
  - StartDBInstance
  - StopDBInstance

  # RDS - DB Clusters (including Aurora)
  - CreateDBCluster
  - DeleteDBCluster
  - ModifyDBCluster
  - StartDBCluster
  - StopDBCluster
  - FailoverDBCluster

  # RDS - Aurora Specific
  - AddRoleToDBCluster
  - RemoveRoleFromDBCluster
  - ModifyDBClusterEndpoint
  - CreateDBClusterEndpoint
  - DeleteDBClusterEndpoint
  - ModifyGlobalCluster

  # RDS - Snapshots
  - CreateDBSnapshot
  - DeleteDBSnapshot
  - ModifyDBSnapshotAttribute
  - CreateDBClusterSnapshot
  - DeleteDBClusterSnapshot

  # RDS - Parameter Groups
  - CreateDBParameterGroup
  - DeleteDBParameterGroup
  - ModifyDBParameterGroup

  # RDS - Subnet Groups
  - CreateDBSubnetGroup
  - DeleteDBSubnetGroup
  - ModifyDBSubnetGroup

  # RDS - Security & Backup
  - ModifyDBInstanceAttribute
  - RestoreDBInstanceFromDBSnapshot
  - RestoreDBClusterFromSnapshot

  # Lambda
  - UpdateFunctionConfiguration
  - UpdateFunctionCode
  - AddPermission
  - RemovePermission

  # API Gateway - REST API
  - CreateRestApi
  - DeleteRestApi
  - UpdateRestApi
  - CreateResource
  - DeleteResource
  - CreateMethod
  - DeleteMethod
  - PutMethod
  - UpdateMethod
  - CreateDeployment
  - DeleteDeployment
  - CreateStage
  - DeleteStage
  - UpdateStage

  # API Gateway - Authorizers & Models
  - CreateAuthorizer
  - DeleteAuthorizer
  - UpdateAuthorizer
  - CreateModel
  - DeleteModel

  # API Gateway - API Keys & Usage Plans
  - CreateApiKey
  - DeleteApiKey
  - UpdateApiKey
  - CreateUsagePlan
  - DeleteUsagePlan
  - UpdateUsagePlan

  # API Gateway v2 (HTTP/WebSocket)
  - CreateApi
  - DeleteApi
  - UpdateApi
  - UpdateRoute
  - CreateIntegration
  - DeleteIntegration
  - UpdateIntegration

  # CloudWatch - Alarms (Critical for monitoring)
  - PutMetricAlarm
  - DeleteAlarms
  - DisableAlarmActions
  - EnableAlarmActions
  - SetAlarmState

  # CloudWatch - Logs (Critical for auditing)
  - CreateLogGroup
  - DeleteLogGroup
  - PutRetentionPolicy
  - DeleteRetentionPolicy
  - AssociateKmsKey
  - DisassociateKmsKey

  # CloudWatch - Metric Filters
  - PutMetricFilter
  - DeleteMetricFilter

  # CloudWatch - Log Streams
  - CreateLogStream
  - DeleteLogStream

  # CloudWatch - Dashboards
  - PutDashboard
  - DeleteDashboards

  # SNS (Critical for alerting)
  - CreateTopic
  - DeleteTopic
  - SetTopicAttributes
  - Subscribe
  - Unsubscribe
  - ConfirmSubscription

  # SQS (Critical for async processing)
  - CreateQueue
  - DeleteQueue
  - SetQueueAttributes
  - PurgeQueue

  # Route53 (Critical for DNS)
  - ChangeResourceRecordSets
  - CreateHostedZone
  - DeleteHostedZone
  - ChangeTagsForResource
  - AssociateVPCWithHostedZone
  - DisassociateVPCFromHostedZone

  # ECR (Critical for container security)
  - PutImageScanningConfiguration
  - PutImageTagMutability
  - PutLifecyclePolicy
  - DeleteLifecyclePolicy
  - SetRepositoryPolicy
  - DeleteRepositoryPolicy
  - CreateRepository
  - DeleteRepository
  - PutReplicationConfiguration

  # SSM Parameter Store (Critical for secrets)
  - PutParameter
  - DeleteParameter
  - DeleteParameters
  - LabelParameterVersion

  # Secrets Manager (Critical for secrets)
  - CreateSecret
  - DeleteSecret
  - UpdateSecret
  - PutSecretValue
  - RotateSecret
  - CancelRotateSecret
  - UpdateSecretVersionStage
  - PutResourcePolicy
  - DeleteResourcePolicy

  # CloudFront (Critical for CDN)
  - CreateDistribution
  - DeleteDistribution
  - UpdateDistribution
  - CreateInvalidation

  # CloudTrail (Critical for auditing)
  - CreateTrail
  - DeleteTrail
  - UpdateTrail
  - StartLogging
  - StopLogging
  - PutEventSelectors
  - PutInsightSelectors

  # ECS - Services (Critical for container orchestration)
  - CreateService
  - UpdateService
  - DeleteService

  # ECS - Task Definitions
  - RegisterTaskDefinition
  - DeregisterTaskDefinition

  # ECS - Clusters
  - UpdateCluster
  - UpdateClusterSettings
  - PutClusterCapacityProviders
  - UpdateContainerInstancesState

  # ECS - Capacity Providers
  - CreateCapacityProvider
  - UpdateCapacityProvider
  - DeleteCapacityProvider

  # EKS - Clusters
  - CreateCluster
  - DeleteCluster
  - UpdateClusterConfig
  - UpdateClusterVersion

  # EKS - Node Groups
  - CreateNodegroup
  - DeleteNodegroup
  - UpdateNodegroupConfig
  - UpdateNodegroupVersion

  # EKS - Addons
  - CreateAddon
  - DeleteAddon
  - UpdateAddon

  # EKS - Fargate Profiles
  - CreateFargateProfile

  # Redshift
  - ModifyCluster
  - ModifyClusterParameterGroup
  - CreateClusterParameterGroup
  - DeleteClusterParameterGroup

  # S3 - Additional events
  - CreateBucket
  - DeleteBucket
  - PutBucketLifecycle
  - DeleteBucketLifecycle
  - PutBucketReplication
  - DeleteBucketReplication
  - PutBucketCors
  - DeleteBucketCors
  - PutBucketWebsite
  - DeleteBucketWebsite
  - PutBucketTagging
  - DeleteBucketTagging

  # Lambda - Additional events
  - CreateFunction
  - DeleteFunction
  - PublishVersion
  - PutProvisionedConcurrencyConfig
  - PutFunctionEventInvokeConfig
  - CreateEventSourceMapping
  - DeleteEventSourceMapping
  - UpdateEventSourceMapping
  - PutFunctionConcurrency
  - DeleteFunctionConcurrency

  # IAM - Additional events
  - UpdateRole
  - TagRole
  - UntagRole
  - UpdateUser
  - UpdateGroup
  - CreateInstanceProfile
  - DeleteInstanceProfile
  - AddRoleToInstanceProfile
  - RemoveRoleFromInstanceProfile

  # CloudFormation - Critical for IaC
  - CreateStack
  - UpdateStack
  - DeleteStack
  - CreateChangeSet
  - ExecuteChangeSet
  - DeleteChangeSet
  - CreateStackSet
  - UpdateStackSet
  - DeleteStackSet
  - SetStackPolicy

  # EventBridge - Critical for event-driven
  - PutRule
  - PutTargets
  - RemoveTargets

  # Step Functions - Critical for workflow
  - CreateStateMachine
  - UpdateStateMachine
  - DeleteStateMachine
  - StartExecution
  - StopExecution

  # AWS Glue - Critical for data pipeline
  - CreateJob
  - UpdateJob
  - DeleteJob
  - CreateCrawler
  - UpdateCrawler
  - DeleteCrawler

  # Kinesis - Critical for streaming
  - CreateStream
  - DeleteStream
  - UpdateShardCount
  - EnableEnhancedMonitoring
  - DisableEnhancedMonitoring
  - StartStreamEncryption
  - StopStreamEncryption
  - RegisterStreamConsumer
  - DeregisterStreamConsumer
  - CreateDeliveryStream
  - DeleteDeliveryStream
  - UpdateDestination

  # ACM - Critical for security
  - RequestCertificate
  - DeleteCertificate
  - AddTagsToCertificate
  - RemoveTagsFromCertificate
  - ImportCertificate

  # WAF / WAFv2 - Critical for security
  - CreateWebACL
  - UpdateWebACL
  - DeleteWebACL
  - CreateRuleGroup
  - UpdateRuleGroup
  - DeleteRuleGroup
  - CreateIPSet
  - UpdateIPSet
  - DeleteIPSet
  - AssociateWebACL
  - DisassociateWebACL

  # AWS Backup - Critical for disaster recovery
  - CreateBackupPlan
  - UpdateBackupPlan
  - DeleteBackupPlan
  - CreateBackupVault
  - DeleteBackupVault
  - PutBackupVaultAccessPolicy
  - DeleteBackupVaultAccessPolicy

# Resource ID field mappings
# Maps CloudTrail event names to ordered lists of field paths to extract resource IDs
resource_id_fields:
  ModifyInstanceAttribute: [ct.request.instanceid, ct.resource.instanceid]
  ModifyVolume: [ct.request.volumeid]
  PutBucketPolicy: [ct.request.bucket, ct.resource.bucket]
  PutBucketEncryption: [ct.request.bucket]
  DeleteBucketEncryption: [ct.request.bucket]
  ModifyDBInstance: [ct.request.dbinstanceidentifier]
  UpdateFunctionConfiguration: [ct.request.functionname]

  # VPC - Security Groups
  AuthorizeSecurityGroupIngress: [ct.request.groupid, ct.request.groupname]
  AuthorizeSecurityGroupEgress: [ct.request.groupid, ct.request.groupname]
  RevokeSecurityGroupIngress: [ct.request.groupid, ct.request.groupname]
  RevokeSecurityGroupEgress: [ct.request.groupid, ct.request.groupname]
  CreateSecurityGroup: [ct.response.groupid, ct.request.groupname]
  DeleteSecurityGroup: [ct.request.groupid, ct.request.groupname]
  ModifySecurityGroupRules: [ct.request.groupid]

  # VPC - Core
  CreateVpc: [ct.response.vpcid, ct.response.vpc.vpcid]
  DeleteVpc: [ct.request.vpcid]
  ModifyVpcAttribute: [ct.request.vpcid]
  CreateSubnet: [ct.response.subnetid, ct.response.subnet.subnetid]
  DeleteSubnet: [ct.request.subnetid]
  ModifySubnetAttribute: [ct.request.subnetid]

  # VPC - Route Tables
  CreateRoute: [ct.request.routetableid]
  DeleteRoute: [ct.request.routetableid]
  ReplaceRoute: [ct.request.routetableid]
  CreateRouteTable: [ct.response.routetableid, ct.response.routetable.routetableid]
  DeleteRouteTable: [ct.request.routetableid]
  AssociateRouteTable: [ct.request.routetableid]

  # VPC - Gateways
  AttachInternetGateway: [ct.request.internetgatewayid]
  DetachInternetGateway: [ct.request.internetgatewayid]
  CreateNatGateway: [ct.response.natgatewayid, ct.response.natgateway.natgatewayid]
  DeleteNatGateway: [ct.request.natgatewayid]

  # VPC - Network ACLs
  CreateNetworkAcl: [ct.response.networkaclid]
  DeleteNetworkAcl: [ct.request.networkaclid]
  CreateNetworkAclEntry: [ct.request.networkaclid]
  DeleteNetworkAclEntry: [ct.request.networkaclid]
  ReplaceNetworkAclEntry: [ct.request.networkaclid]

  # VPC - Endpoints
  CreateVpcEndpoint: [ct.response.vpcendpointid]
  DeleteVpcEndpoint: [ct.request.vpcendpointid]
  ModifyVpcEndpoint: [ct.request.vpcendpointid]

  # ELB/ALB
  CreateLoadBalancer: [ct.response.loadbalancers.0.loadbalancerarn]
  DeleteLoadBalancer: [ct.request.loadbalancerarn]
  ModifyLoadBalancerAttributes: [ct.request.loadbalancerarn]
  CreateTargetGroup: [ct.response.targetgroups.0.targetgrouparn]
  DeleteTargetGroup: [ct.request.targetgrouparn]
  ModifyTargetGroup: [ct.request.targetgrouparn]
  ModifyTargetGroupAttributes: [ct.request.targetgrouparn]
  RegisterTargets: [ct.request.targetgrouparn]
  DeregisterTargets: [ct.request.targetgrouparn]
  CreateListener: [ct.response.listeners.0.listenerarn]
  DeleteListener: [ct.request.listenerarn]
  ModifyListener: [ct.request.listenerarn]
  CreateRule: [ct.response.rules.0.rulearn]
  DeleteRule: [ct.request.rulearn]
  ModifyRule: [ct.request.rulearn]

  # KMS
  ScheduleKeyDeletion: [ct.request.keyid]
  DisableKey: [ct.request.keyid]
  EnableKey: [ct.request.keyid]
  PutKeyPolicy: [ct.request.keyid]
  CreateKey: [ct.response.keymetadata.keyid]
  CreateAlias: [ct.request.aliasname]
  DeleteAlias: [ct.request.aliasname]
  UpdateAlias: [ct.request.aliasname]
  EnableKeyRotation: [ct.request.keyid]
  DisableKeyRotation: [ct.request.keyid]

  # DynamoDB
  CreateTable: [ct.request.tablename]
  DeleteTable: [ct.request.tablename]
  UpdateTable: [ct.request.tablename]
  UpdateTimeToLive: [ct.request.tablename]
  UpdateContinuousBackups: [ct.request.tablename]

  # IAM - Roles
  PutRolePolicy: [ct.request.rolename]
  UpdateAssumeRolePolicy: [ct.request.rolename]
  AttachRolePolicy: [ct.request.rolename]
  CreateRole: [ct.request.rolename]
  DeleteRole: [ct.request.rolename]

  # IAM - Users
  PutUserPolicy: [ct.request.username]
