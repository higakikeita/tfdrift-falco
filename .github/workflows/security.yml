name: Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Weekly full scan on Monday at 6 AM UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Scan type to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - gosec
          - nancy

permissions:
  contents: read
  security-events: write
  pull-requests: write

env:
  GO_VERSION: '1.25'
  NODE_VERSION: '20'

jobs:
  # ============================================
  # Detect changed files (for path-based filtering)
  # ============================================
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          filters: |
            backend:
              - '**.go'
              - 'go.mod'
              - 'go.sum'
              - 'cmd/**'
              - 'pkg/**'
            frontend:
              - 'ui/**'
              - 'package.json'
              - 'package-lock.json'

  # ============================================
  # GoSec Security Scanner
  # ============================================
  gosec:
    name: GoSec Security Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: |
      github.event_name == 'schedule' ||
      (github.event.inputs.scan_type == 'all' || github.event.inputs.scan_type == 'gosec') ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && needs.changes.outputs.backend == 'true')

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run Gosec Security Scanner
        uses: securego/gosec@1769a22fd149bfd9e5e546e06a7f9d596eab2f65 # master
        continue-on-error: true
        with:
          args: '-fmt sarif -out gosec.sarif -exclude-generated ./...'

      - name: Upload Gosec results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        if: always() && hashFiles('gosec.sarif') != ''
        with:
          sarif_file: gosec.sarif
          category: gosec

      - name: Comment PR with GoSec results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require('fs');
            let body = '## 🔐 GoSec Security Scanner\n\n';
            try {
              const data = JSON.parse(fs.readFileSync('gosec.sarif', 'utf8'));
              const runs = data.runs || [{}];
              const results = (runs[0] || {}).results || [];

              if (results.length === 0) {
                body += '✅ No security issues found\n';
              } else {
                const high = results.filter(r => r.level === 'error').length;
                const medium = results.filter(r => r.level === 'warning').length;
                body += `⚠️ ${results.length} issues (${high} high, ${medium} medium)\n`;
              }
            } catch (e) {
              body += '✅ Scan completed or skipped\n';
            }
            body += '\n> Full results in the [Security tab](../../security/code-scanning)';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  # ============================================
  # Nancy Dependency Check
  # ============================================
  nancy:
    name: Nancy Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: |
      github.event_name == 'schedule' ||
      (github.event.inputs.scan_type == 'all' || github.event.inputs.scan_type == 'nancy') ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && needs.changes.outputs.backend == 'true')

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Write Go List
        run: go list -json -deps ./... > go.list

      - name: Run Nancy
        uses: sonatype-nexus-community/nancy-github-action@395e2fb168f674f96502e5652103d112899ea369 # main
        continue-on-error: true
