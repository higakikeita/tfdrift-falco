name: Publish to GHCR

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and push (e.g., v0.2.0-beta)'
        required: false
        default: 'latest'

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Guardrail against version identity drift (ADR-0002): a release tag
  # must match the VERSION file and the first versioned CHANGELOG entry,
  # otherwise the publish fails before any image is built.
  verify-version-consistency:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify tag == VERSION == CHANGELOG head
        run: |
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            echo "Not a tag build (${GITHUB_REF_TYPE}); skipping version consistency check."
            exit 0
          fi
          TAG="${GITHUB_REF_NAME#v}"
          FILE_VERSION="$(tr -d '[:space:]' < VERSION)"
          CHANGELOG_VERSION="$(grep -m1 -oE '^## \[[0-9]+\.[0-9]+\.[0-9]+[^]]*\]' CHANGELOG.md | tr -d '#[] ')"
          BINARY_VERSION="$(grep -m1 -oE 'version += +"[0-9]+\.[0-9]+\.[0-9]+"' cmd/tfdrift/main.go | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')"
          DOCS_VERSION="$(grep -m1 -oE 'project_version: +"[0-9]+\.[0-9]+\.[0-9]+"' mkdocs.yml | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')"
          DOCS_INDEX_VERSION="$(grep -m1 -oE '\*\*Version:\*\* v[0-9]+\.[0-9]+\.[0-9]+' docs/index.md | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')"
          WEBSITE_VERSION="$(grep -m1 -oE '"v[0-9]+\.[0-9]+\.[0-9]+" label="Latest Release"' website/app/page.tsx | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')"
          echo "tag=v${TAG} VERSION=${FILE_VERSION} CHANGELOG=${CHANGELOG_VERSION} binary=${BINARY_VERSION} docs=${DOCS_VERSION}/${DOCS_INDEX_VERSION} website=${WEBSITE_VERSION}"
          FAIL=0
          for pair in "VERSION:${FILE_VERSION}" "CHANGELOG:${CHANGELOG_VERSION}" "binary:${BINARY_VERSION}" "mkdocs:${DOCS_VERSION}" "docs-index:${DOCS_INDEX_VERSION}" "website:${WEBSITE_VERSION}"; do
            name="${pair%%:*}"; val="${pair#*:}"
            if [ "${TAG}" != "${val}" ]; then
              echo "::error::Version identity mismatch at ${name}: expected ${TAG}, found '${val}'. Align it before releasing (ADR-0002/0005)."
              FAIL=1
            fi
          done
          [ "${FAIL}" = "1" ] && exit 1
          # Release notes page must exist on the docs site for this version
          if [ ! -f "docs/release-notes/v${TAG}.md" ]; then
            echo "::error::docs/release-notes/v${TAG}.md is missing — add the release notes page before tagging."
            exit 1
          fi
          echo "✅ Version identity consistent: v${TAG}"

  build-and-push:
    runs-on: ubuntu-latest
    needs: verify-version-consistency
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      # Required for the linux/arm64 half of the multi-arch build on
      # amd64 runners; without it every RUN in the arm64 stage fails
      # with "exec format error".
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            # Also publish the v-prefixed tag verbatim (docker pull ...:v0.13.0)
            type=semver,pattern={{raw}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # NOTE: {{branch}} is empty on tag builds, which used to produce
            # the invalid tag ":-<sha>" and kill buildx before building.
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Docker Scout CVE scan
        uses: docker/scout-action@bacf462e8d090c09660de30a6ccc718035f961e3 # v1
        if: github.event_name == 'pull_request'
        with:
          command: cves
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          only-severities: critical,high
          exit-code: false

  verify-image:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag to verify
        id: tag
        run: |
          # Tag pushes publish semver tags (v0.12.0 -> 0.12.0) but only
          # default-branch builds move :latest, so verify what was built.
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull and verify image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }} --version || echo "Version check not supported yet"

      - name: Test image functionality
        run: |
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }} --help || echo "Help command executed"
