name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  pull-requests: write

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '20'

jobs:
  # ============================================
  # Detect changed files
  # ============================================
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - '**.go'
              - 'go.mod'
              - 'go.sum'
              - 'cmd/**'
              - 'pkg/**'
              - 'tests/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'ui/**'
              - '.github/workflows/ci.yml'

  # ============================================
  # Backend: Go Build, Lint, and Test
  # ============================================
  backend:
    name: Backend
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      # ===== Lint (from lint.yml) =====
      - name: Install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.64.8

      - name: Run golangci-lint
        run: golangci-lint run --timeout=5m
        continue-on-error: true

      - name: Check formatting
        continue-on-error: true
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "❌ Go files must be formatted with gofmt. Please run:"
            echo "  gofmt -w ."
            gofmt -l .
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...
        continue-on-error: true

      - name: Run staticcheck
        continue-on-error: true
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: Check go mod tidy
        continue-on-error: true
        run: |
          go mod tidy
          if [ -n "$(git status --porcelain go.mod go.sum)" ]; then
            echo "❌ go.mod or go.sum is not up to date. Please run:"
            echo "  go mod tidy"
            git diff go.mod go.sum
            exit 1
          fi

      # ===== Test (from test.yml) =====
      - name: Run tests with coverage
        continue-on-error: true
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Generate coverage report
        run: go tool cover -func=coverage.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.out
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

      # ===== Build =====
      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o tfdrift \
            ./cmd/tfdrift

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfdrift-binary
          path: tfdrift
          retention-days: 7

  # ============================================
  # Frontend: UI Build, Lint, and Test
  # ============================================
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    defaults:
      run:
        working-directory: ./ui

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # ===== Lint =====
      - name: Run ESLint
        continue-on-error: true
        run: npm run lint

      - name: Run TypeScript compiler
        continue-on-error: true
        run: npx tsc -b --noEmit

      # ===== Test =====
      - name: Run unit tests
        continue-on-error: true
        run: npm test -- --passWithNoTests

      - name: Run tests with coverage
        continue-on-error: true
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: ./ui/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false

      # ===== Build =====
      - name: Build for production
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ui/dist
          retention-days: 7

  # ============================================
  # Docker Build and Push
  # ============================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' || github.event_name == 'release'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'release'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        continue-on-error: true
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/tfdrift-falco
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        continue-on-error: true
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'release' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        continue-on-error: true
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/tfdrift-frontend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        continue-on-error: true
        with:
          context: ./ui
          file: ./ui/Dockerfile
          push: ${{ github.event_name == 'release' }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ============================================
  # Integration Tests
  # ============================================
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [changes, backend]
    if: |
      github.event_name == 'workflow_dispatch' ||
      (needs.changes.outputs.backend == 'true' && (github.event_name == 'push' || github.event_name == 'pull_request'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run integration tests
        run: |
          cd tests/integration
          # Check if there are active test files (not build-ignored)
          go list -f '{{.TestGoFiles}}' ./... | grep -q "\[.*\]"
          if [ $? -eq 0 ]; then
            go test -v -race -coverprofile=integration-coverage.out ./...
          else
            echo "ℹ️  Integration tests are disabled (build tags: ignore)"
            echo "These tests require external services (Slack, Grafana, etc.)"
            echo "Skipping..."
            # Create empty coverage file to satisfy next step
            touch integration-coverage.out
            exit 0
          fi

      - name: Generate integration coverage report
        run: |
          cd tests/integration
          if [ -s integration-coverage.out ]; then
            go tool cover -func=integration-coverage.out
          else
            echo "No coverage data to report"
          fi

      - name: Upload integration coverage
        uses: codecov/codecov-action@v5
        with:
          file: ./tests/integration/integration-coverage.out
          flags: integration
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Run integration tests for summary
        if: github.event_name == 'pull_request'
        run: |
          cd tests/integration
          go test -v ./... 2>&1 | tee integration-results.txt
        continue-on-error: true

      - name: Comment PR with integration test results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let results = '';
            try {
              results = fs.readFileSync('tests/integration/integration-results.txt', 'utf8');
            } catch (e) {
              results = 'Could not read test results';
            }

            // Parse test results
            const passMatch = results.match(/PASS/g);
            const failMatch = results.match(/FAIL/g);
            const passCount = passMatch ? passMatch.length : 0;
            const failCount = failMatch ? failMatch.length : 0;

            // Extract test names
            const testLines = results.split('\n').filter(line =>
              line.includes('=== RUN') || line.includes('--- PASS') || line.includes('--- FAIL')
            );

            let summary = '## 🔗 Integration Test Results\n\n';

            if (failCount === 0) {
              summary += '✅ **All integration tests passed!**\n\n';
            } else {
              summary += '❌ **Some integration tests failed**\n\n';
            }

            summary += `- Passed: ${passCount}\n`;
            summary += `- Failed: ${failCount}\n\n`;

            if (testLines.length > 0) {
              summary += '### Test Details\n\n';
              summary += '```\n';
              summary += testLines.slice(0, 20).join('\n'); // First 20 lines
              if (testLines.length > 20) {
                summary += '\n... (truncated)\n';
              }
              summary += '\n```\n';
            }

            summary += '\n### What are Integration Tests?\n\n';
            summary += 'Integration tests validate component interactions with mocked external dependencies:\n';
            summary += '- Slack/Discord webhook notifications\n';
            summary += '- Falco gRPC event parsing\n';
            summary += '- State loading and comparison\n';
            summary += '- No real AWS or Falco required\n';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
