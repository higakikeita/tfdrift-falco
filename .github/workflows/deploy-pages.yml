# Unified GitHub Pages deployment: MkDocs (root) + Storybook (/storybook/)
# Replaces separate docs.yml and ui-storybook.yml to prevent deployment conflicts
name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'ui/src/**'
      - 'ui/.storybook/**'
      - 'ui/package.json'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # --- MkDocs Build ---
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install MkDocs dependencies
        run: |
          pip install "mkdocs>=1.6,<2" "mkdocs-material>=9.5,<10" "pygments>=2.16,<2.20" mkdocs-minify-plugin

      - name: Build MkDocs site
        run: mkdocs build --site-dir ./site
        env:
          PYTHONDONTWRITEBYTECODE: 1

      # --- Storybook Build (optional — does not block docs deploy) ---
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci
        continue-on-error: true

      - name: Build Storybook
        working-directory: ui
        run: npm run build-storybook -- --output-dir ../site/storybook
        continue-on-error: true

      # --- Deploy ---
      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
