{{- if and (not .Values.existingSecret) .Values.config.auth.jwtSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tfdrift-falco.fullname" . }}-secret
  labels:
    {{- include "tfdrift-falco.labels" . | nindent 4 }}
type: Opaque
data:
  jwt-secret: {{ .Values.config.auth.jwtSecret | b64enc | quote }}
{{- end }}
