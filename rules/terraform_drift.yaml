# TFDrift-Falco Rules
#
# These rules select the CloudTrail events that TFDrift-Falco inspects for
# drift. The event list is kept in lock-step with the backend's authoritative
# capability set in pkg/falco/configs/event_mappings.yaml: every event named
# here is in `relevant_events` AND has a `resource_id_fields` mapping, so an
# event that fires can actually be resolved to a resource and compared against
# Terraform state. A regression test (pkg/falco/rules_coverage_test.go) fails
# CI if these drift apart.
#
# Coverage: 246 events (was ~24). This lifts the "detection ceiling"
# where representative drift (security-group ingress, ModifyVpcAttribute,
# PutBucketAcl, ModifyDBInstance, ...) fired in the mapping tables but never
# in the rule, so it was silently never inspected. See issue #324.
#
# Field names are validated against the cloudtrail plugin (0.12.x) with
# `falco -V` (see docs/complete-setup-guide.md).

- rule: Terraform Managed Resource Modified
  desc: Potential Terraform drift detected
  condition: >
    ct.name in (
      "AddPermission", "AddRoleToDBCluster", "AssociateKmsKey", "AssociateRouteTable",
      "AssociateVPCWithHostedZone", "AttachInternetGateway", "AuthorizeSecurityGroupEgress", "AuthorizeSecurityGroupIngress",
      "CancelRotateSecret", "ChangeResourceRecordSets", "ChangeTagsForResource", "ConfirmSubscription",
      "CreateAddon", "CreateAlias", "CreateApi", "CreateApiKey",
      "CreateAuthorizer", "CreateCapacityProvider", "CreateCluster", "CreateClusterParameterGroup",
      "CreateDBCluster", "CreateDBClusterEndpoint", "CreateDBClusterSnapshot", "CreateDBInstance",
      "CreateDBParameterGroup", "CreateDBSnapshot", "CreateDBSubnetGroup", "CreateDeployment",
      "CreateDistribution", "CreateFargateProfile", "CreateHostedZone", "CreateIntegration",
      "CreateInvalidation", "CreateKey", "CreateListener", "CreateLoadBalancer",
      "CreateLogGroup", "CreateLogStream", "CreateMethod", "CreateModel",
      "CreateNatGateway", "CreateNetworkAcl", "CreateNetworkAclEntry", "CreateNodegroup",
      "CreateQueue", "CreateRepository", "CreateResource", "CreateRestApi",
      "CreateRoute", "CreateRouteTable", "CreateRule", "CreateSecret",
      "CreateSecurityGroup", "CreateService", "CreateStage", "CreateSubnet",
      "CreateTable", "CreateTargetGroup", "CreateTopic", "CreateTrail",
      "CreateUsagePlan", "CreateVpc", "CreateVpcEndpoint", "DisableAlarmActions",
      "DisassociateKmsKey", "DisassociateVPCFromHostedZone", "EnableAlarmActions", "EnableKey",
      "FailoverDBCluster", "LabelParameterVersion", "ModifyCluster", "ModifyClusterParameterGroup",
      "ModifyDBClusterEndpoint", "ModifyDBInstance", "ModifyDBInstanceAttribute", "ModifyDBParameterGroup",
      "ModifyDBSnapshotAttribute", "ModifyDBSubnetGroup", "ModifyGlobalCluster", "ModifyInstanceAttribute",
      "ModifyListener", "ModifyLoadBalancerAttributes", "ModifyRule", "ModifySecurityGroupRules",
      "ModifySubnetAttribute", "ModifyTargetGroup", "ModifyTargetGroupAttributes", "ModifyVolume",
      "ModifyVpcAttribute", "ModifyVpcEndpoint", "PurgeQueue", "PutBucketEncryption",
      "PutBucketVersioning", "PutClusterCapacityProviders", "PutDashboard", "PutEventSelectors",
      "PutImageScanningConfiguration", "PutImageTagMutability", "PutInsightSelectors", "PutLifecyclePolicy",
      "PutMethod", "PutMetricAlarm", "PutMetricFilter", "PutParameter",
      "PutReplicationConfiguration", "PutResourcePolicy", "PutRetentionPolicy", "PutSecretValue",
      "RebootDBInstance", "RegisterTargets", "RegisterTaskDefinition", "RemovePermission",
      "RemoveRoleFromDBCluster", "ReplaceNetworkAclEntry", "ReplaceRoute", "RestoreDBClusterFromSnapshot",
      "RestoreDBInstanceFromDBSnapshot", "RotateSecret", "SetAlarmState", "SetQueueAttributes",
      "SetRepositoryPolicy", "SetTopicAttributes", "StartDBCluster", "StartDBInstance",
      "StartLogging", "StopDBCluster", "StopDBInstance", "StopLogging",
      "Subscribe", "Unsubscribe", "UpdateAddon", "UpdateAlias",
      "UpdateApi", "UpdateApiKey", "UpdateAuthorizer", "UpdateCapacityProvider",
      "UpdateCluster", "UpdateClusterConfig", "UpdateClusterSettings", "UpdateClusterVersion",
      "UpdateContainerInstancesState", "UpdateContinuousBackups", "UpdateDistribution", "UpdateFunctionConfiguration",
      "UpdateIntegration", "UpdateMethod", "UpdateNodegroupConfig", "UpdateNodegroupVersion",
      "UpdateRestApi", "UpdateRoute", "UpdateSecret", "UpdateSecretVersionStage",
      "UpdateService", "UpdateStage", "UpdateTable", "UpdateTimeToLive",
      "UpdateTrail", "UpdateUsagePlan"
    )
  output: >
    Potential Terraform drift detected
    (user=%ct.user
     event=%ct.name
     resource=%ct.request.name
     request=%ct.request
     region=%ct.region
     source_ip=%ct.srcip
     aws_account=%ct.user.accountid)
  priority: WARNING
  tags: [terraform, drift, iac]
  source: aws_cloudtrail

- rule: IAM or Access Control Change
  desc: Access-control change that may escalate privileges or expose resources
  condition: >
    ct.name in (
      "AddUserToGroup", "AttachGroupPolicy", "AttachRolePolicy", "AttachUserPolicy",
      "CreateAccessKey", "CreatePolicy", "CreatePolicyVersion", "CreateRole",
      "CreateUser", "DeleteBucketPublicAccessBlock", "DisableKey", "DisableKeyRotation",
      "EnableKeyRotation", "PutBucketAcl", "PutBucketPolicy", "PutBucketPublicAccessBlock",
      "PutGroupPolicy", "PutKeyPolicy", "PutRolePolicy", "PutUserPolicy",
      "RemoveUserFromGroup", "UpdateAssumeRolePolicy"
    )
  output: >
    Access-control change that may escalate privileges or expose resources
    (user=%ct.user
     event=%ct.name
     resource=%ct.request.name
     request=%ct.request
     region=%ct.region
     source_ip=%ct.srcip
     aws_account=%ct.user.accountid)
  priority: ALERT
  tags: [terraform, drift, iam, security, privilege-escalation]
  source: aws_cloudtrail

- rule: Critical Infrastructure Change
  desc: Critical infrastructure deletion or destructive change detected
  condition: >
    ct.name in (
      "DeleteAddon", "DeleteAlarms", "DeleteAlias", "DeleteApi",
      "DeleteApiKey", "DeleteAuthorizer", "DeleteBucketEncryption", "DeleteCapacityProvider",
      "DeleteCluster", "DeleteClusterParameterGroup", "DeleteDBCluster", "DeleteDBClusterEndpoint",
      "DeleteDBClusterSnapshot", "DeleteDBInstance", "DeleteDBParameterGroup", "DeleteDBSnapshot",
      "DeleteDBSubnetGroup", "DeleteDashboards", "DeleteDeployment", "DeleteDistribution",
      "DeleteHostedZone", "DeleteIntegration", "DeleteLifecyclePolicy", "DeleteListener",
      "DeleteLoadBalancer", "DeleteLogGroup", "DeleteLogStream", "DeleteMethod",
      "DeleteMetricFilter", "DeleteModel", "DeleteNatGateway", "DeleteNetworkAcl",
      "DeleteNetworkAclEntry", "DeleteNodegroup", "DeleteParameter", "DeleteParameters",
      "DeleteQueue", "DeleteRepository", "DeleteRepositoryPolicy", "DeleteResource",
      "DeleteResourcePolicy", "DeleteRestApi", "DeleteRetentionPolicy", "DeleteRole",
      "DeleteRoute", "DeleteRouteTable", "DeleteRule", "DeleteSecret",
      "DeleteSecurityGroup", "DeleteService", "DeleteStage", "DeleteSubnet",
      "DeleteTable", "DeleteTargetGroup", "DeleteTopic", "DeleteTrail",
      "DeleteUsagePlan", "DeleteUser", "DeleteVpc", "DeleteVpcEndpoint",
      "DeregisterTargets", "DeregisterTaskDefinition", "DetachInternetGateway", "RevokeSecurityGroupEgress",
      "RevokeSecurityGroupIngress", "ScheduleKeyDeletion"
    )
  output: >
    Critical infrastructure deletion or destructive change detected
    (user=%ct.user
     event=%ct.name
     resource=%ct.request.name
     request=%ct.request
     region=%ct.region
     source_ip=%ct.srcip
     aws_account=%ct.user.accountid)
  priority: CRITICAL
  tags: [terraform, drift, deletion, critical]
  source: aws_cloudtrail
