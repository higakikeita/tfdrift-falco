version: '3.8'

services:
  # Mock Falco gRPC server
  mock-falco:
    build:
      context: .
      dockerfile: Dockerfile.mock-falco
    container_name: tfdrift-e2e-falco
    ports:
      - "5060:5060"    # gRPC server
      - "8081:8081"    # HTTP control API
    environment:
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - tfdrift-network

  # TFDrift-Falco API server
  tfdrift:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: runtime
    container_name: tfdrift-e2e-api
    ports:
      - "8080:8080"    # API server
    volumes:
      - ./fixtures/simple.tfstate:/data/terraform.tfstate:ro
      - ./config.yaml:/config/config.yaml:ro
    environment:
      - TFDRIFT_CONFIG=/config/config.yaml
      - LOG_LEVEL=debug
    depends_on:
      mock-falco:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - tfdrift-network
    command: [
      "--server",
      "--api-port", "8080",
      "--config", "/config/config.yaml"
    ]

networks:
  tfdrift-network:
    driver: bridge
