# Falco configuration for TFDrift-Falco
watch_config_files: true
time_format_iso_8601: true

# Rules
rules_file:
  - /etc/falco/falco_rules.yaml
  - /etc/falco/falco_rules.local.yaml
  - /etc/falco/rules.d

# gRPC output (required for TFDrift-Falco)
grpc:
  enabled: true
  bind_address: "0.0.0.0:5060"
  threadiness: 8

grpc_output:
  enabled: true

# JSON output for CloudTrail events
json_output: true
json_include_output_property: true
json_include_tags_property: true

# Logging
log_stderr: true
log_syslog: false
log_level: info

# CloudTrail plugin configuration
plugins:
  - name: cloudtrail
    library_path: libcloudtrail.so
    init_config:
      s3DownloadConcurrency: 64
      sqsDelete: false
      useAsync: true
    open_params: ""

# Load CloudTrail plugin rules
load_plugins: [cloudtrail]
