version: "2"

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck      # Check for unchecked errors
    - govet         # Vet examines Go source code
    - ineffassign   # Detect ineffectual assignments
    - staticcheck   # Static analysis
    - unused        # Check for unused constants, variables, functions
    - misspell      # Check for misspelled English words
    - revive        # Fast, configurable, extensible linter
    - gosec         # Security-focused linter
    - unparam       # Check for unused function parameters
  settings:
    errcheck:
      check-blank: false
      check-type-assertions: true
      exclude-functions:
        # Common functions where ignoring errors is acceptable
        - io.Copy
        - io.WriteTo
        - (io.Closer).Close
        - (*os.File).Close
        - (net.Conn).Close
        - (*net/http.Response.Body).Close
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (net.Conn).SetDeadline
        - (net.Conn).SetReadDeadline
        - (net.Conn).SetWriteDeadline
        - (*github.com/gorilla/websocket.Conn).SetReadDeadline
        - (*github.com/gorilla/websocket.Conn).SetWriteDeadline
        - (*github.com/gorilla/websocket.Conn).WriteMessage
        - (*github.com/gorilla/websocket.Conn).WriteJSON
        - (*encoding/json.Encoder).Encode
        - (net/http.ResponseWriter).Write

    govet:
      enable-all: true
      disable:
        - shadow          # Too strict for practical use
        - fieldalignment  # Struct field ordering for memory alignment (cosmetic)
        - unusedwrite     # Unused writes to struct fields (false positives common)

    staticcheck:
      checks:
        - "all"
        - "-ST1018"  # Unicode control chars in string literals (intentional in autodetect.go)
        - "-SA1019"  # Deprecated field usage (intentional backward compatibility)
        - "-ST1000"  # Package comments (too noisy for current codebase)
        - "-QF1008"  # Embedded field selector simplification (style preference)
        - "-SA9003"  # Empty branch (intentional in test scaffolding)
        - "-QF1003"  # Convert if/else-if chain to tagged switch (style preference)
        - "-QF1012"  # Use fmt.Fprintf instead of WriteString(fmt.Sprintf) (style preference)
        - "-S1009"   # Omit nil check before len (style preference)
        - "-S1011"   # Use single append for slice concatenation (style preference)
        - "-ST1003"  # ALL_CAPS naming convention (existing Go constants)
        - "-ST1020"  # Comment on exported function form (noisy)
        - "-SA1012"  # Nil context in tests (intentional for error path testing)
        - "-SA4006"  # Unused value (false positives in test code)
        - "-S1040"   # Type assertion to same type (style preference)

    gosec:
      excludes:
        - G104  # Allow unchecked errors in some cases
        - G307  # Allow deferred file.Close() without checking error
        - G115  # Integer overflow conversion (common with uint/int casts)
        - G204  # Audit use of os/exec to spawn subprocess with variable input
        - G304  # Audit file access without validation
        - G107  # Possible hardcoded credentials in URL
        - G114  # Use of net/http serve functions that have no support for setting timeouts
        - G101  # Audit the use of assert.NoError

    revive:
      rules:
        - name: exported
          disabled: true

  exclusions:
    rules:
      - path: pkg/aws/discovery_resources.go
        linters: [staticcheck]
        text: "SA4010"
      # Exclude some linters from running on tests files
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - unparam

      # Exclude testutil mock files
      - path: pkg/testutil/
        linters:
          - errcheck
          - unused

      # Exclude test directories
      - path: tests/
        linters:
          - errcheck
          - gosec
          - unparam

      # Exclude cmd directories (main packages with simplified error handling)
      - path: cmd/
        linters:
          - errcheck

      # Exclude unparam from handlers and notifier (pre-existing design patterns)
      - path: pkg/api/handlers/
        linters:
          - unparam
      - path: pkg/notifier/
        linters:
          - unparam

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

output:
  formats:
    text:
      print-issued-lines: true
      print-linter-name: true
